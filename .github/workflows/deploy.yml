name: Deploy to Aliyun OSS

on:
  push:
    branches:
      - main          # 替换为你的默认分支名（master 或 main）

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '23'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload to OSS
        uses: aliyun/oss-upload@v1
        with:
          accessKeyId: ${{ secrets.OSS_ACCESS_KEY_ID }}
          accessKeySecret: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          bucket: guangda-cui
          endpoint: oss-cn-hongkong.aliyuncs.com
          folder: dist
